


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regalando Sonrisas - Iniciar Sesión</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="relative flex items-center justify-center h-screen bg-cover bg-center bg-no-repeat font-sans"
      style="background-image: url('https://plus.unsplash.com/premium_photo-1661605574121-fd0cc6199b52?q=80&w=1201&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');">


    <div class="absolute inset-0 bg-indigo-950/40 backdrop-blur-xs"></div>


    <div class="relative bg-white/95 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-100 transition-all duration-300 backdrop-blur-md">


        <div class="text-center mb-8">
            <span class="text-3xl block mb-2">🎁</span>
            <h2 class="text-2xl font-black tracking-tight text-indigo-900">🎁 Regalando <span class="text-amber-500">Sonrisas</span></h2>
            <p class="text-xs font-semibold tracking-widest text-gray-400 uppercase mt-1">Panel de Administración</p>
        </div>

        <div id="error-message" class="hidden bg-red-50 border-l-4 border-red-500 text-red-700 p-4 rounded-r-lg mb-6 text-sm shadow-xs animate-pulse">
        </div>


        <form id="login-form" class="space-y-5">
            <div>
                <label for="username" class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Usuario</label>
                <div class="relative">
                    <input type="text" id="username" name="username" required placeholder="Tu usuario"
                        class="block w-full px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl text-sm transition-all focus:outline-hidden focus:border-indigo-500 focus:bg-white focus:ring-4 focus:ring-indigo-100 text-gray-800">
                </div>
            </div>

            <div>
                <label for="password" class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Contraseña</label>
                <input type="password" id="password" name="password" required placeholder="••••••••"
                    class="block w-full px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl text-sm transition-all focus:outline-hidden focus:border-indigo-500 focus:bg-white focus:ring-4 focus:ring-indigo-100 text-gray-800">
            </div>

            <div class="pt-2">
                <button type="submit"
                    class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 cursor-pointer shadow-lg shadow-indigo-600/30 transition-all duration-200 hover:-translate-y-0.5 active:translate-y-0">
                    Ingresar al Sistema
                </button>
            </div>
        </form>


        <div class="mt-8 text-center border-t border-gray-100 pt-4">
            <p class="text-xs text-gray-400">© 2026 Asociación Regalando Sonrisas</p>
        </div>
    </div>


    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');

            errorDiv.classList.add('hidden');
            errorDiv.innerText = '';

            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: usernameInput,
                        password: passwordInput
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Ocurrió un error al iniciar sesión');
                }

                localStorage.setItem('token', data.access_token);
                localStorage.setItem('token_type', data.token_type);

                window.location.href = '/dashboard';

            } catch (error) {
                errorDiv.innerText = error.message;
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
